name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["master"]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend for GitHub Pages
        run: npm run build
        working-directory: web
        env:
          VITE_DATA_MODE: browser
          VITE_BASE_PATH: /daycare-for-animals/

      - name: Refresh docs site
        run: |
          rm -rf docs
          mkdir -p docs
          cp -R web/dist/. docs/
          touch docs/.nojekyll

      - name: Commit docs output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet && exit 0
          git commit -m "Update GitHub Pages site" --no-verify
          git push
